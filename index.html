<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AUDIOBITES</title>

  <!-- Fonts -->
  <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" integrity="sha384-JcKb8q3iqJ61gNV9KGb8thSsNjpSL0n8PARn9HuZOnIxN0hoP+VmmDGMN5t9UJ0Z" crossorigin="anonymous"/>
  <link href="https://fonts.googleapis.com/css2?family=Elsie&family=Abril+Fatface&family=Almendra+Display&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Libre+Caslon+Display&family=Love+Light&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    /* Navbar */
    .custom-navbar {
    background: transparent !important; /* fully transparent */
    padding: 15px 30px;
  }

.custom-navbar .nav-link {
  color: rgb(253, 253, 253) !important;
  font-family: 'Elsie', serif;
  font-size: 18px;
  transition: color 0.3s ease;
}

.custom-navbar .nav-link:hover {
  color: #C4AE45 !important; /* gold on hover */
}

.custom-navbar .navbar-brand {
  color: #C4AE45 !important; /* brand in gold */
  font-weight: bold;
  font-size: 22px;
}
.font-size {
  width: 100px;}

    /* Home Section */
    .body-home {
      background: #000000;
      color: #ffffff;
      font-family: sans-serif;
      overflow-x: hidden;
    }

    .home {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    /* Logo container with pulse */
    .logo-container {
      position: relative;
      width: 350px;
      height: 350px;
      margin-bottom: 30px;
    }

    .logo-container img {
      width: 100%;
      height: 100%;
      position: relative;
      z-index: 2;
      filter: drop-shadow(0 0 10px rgba(60, 96, 132, 0.854));
      animation: float 6s ease-in-out infinite;
    }
    @keyframes float {
  0%   { transform: translateY(0); }
  50%  { transform: translateY(-15px); }
  100% { transform: translateY(0); }
}
    .pulse-svg {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
    }

    .pulse {
      fill: #0f0c27;
      animation: grow 1.6s ease-in-out infinite alternate;
    }

    @keyframes grow {
      from { r: 40; opacity: 0.6; }
      to   { r: 70; opacity: 0.2; }
    }

    /* Main title */
    .home-heading{
      font-family: 'Libre Caslon Display', serif;
      font-size: 80px;
      color: #ffffff;
      text-shadow: 5px 4px 10px #c4ae45;
      margin-bottom: 10px;
    }
    .text-container {
      opacity: 0;
      animation: fadeIn 2s ease-in-out 1s forwards;
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    /* Tagline */
    .home-tagline {
      font-family: 'Love Light', cursive;
      font-size: 30px;
      color: #ffffff;
    }

    /* Ellipse gradient at bottom */
    .ellipse {
      position: absolute;
      bottom: -150px;
      left: 50%;
      transform: translateX(-50%);
      width: 100%;
      height: 320px;
      background: linear-gradient(to right, #43116A, #0A1832);
      border-radius: 50%;
      filter: blur(50px);
      z-index: 0;
    }
    /* General Section */
    .general-body {
      margin: 0;
      padding: 0;
      background: linear-gradient(to bottom, #d4af37, #350f0f); /* gold to brown */
      color: white;
      font-family: sans-serif;
      overflow-x: hidden;
    }
    .general {
      display: flex;
      justify-content: space-between;
      align-items: center;
      min-height: 100vh;
    }

    .general-text {
      max-width: 600px;
      margin-left: 150px;
    }

    .general-text h1 {
  font-family: 'Abril Fatface', serif;
  font-size: 100px;
  margin: 0 0 20px 0;
  line-height: 1.1;
  color: white;
  /* animation: slideRight 3s ease forwards; */
  opacity: 0;
  transform: translateX(-90px);
    }
    @keyframes slideRight {
      from { transform: translateX(-90px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    .general-text p {
      font-family: 'Almendra Display', serif;
      font-size: 50px;
      margin-bottom: 40px;
      color: white;
    }

    .general-explore-btn {
  background: transparent;
  border: 2px solid #C4AE45;
  color: #C4AE45;
  padding: 12px 28px;
  font-size: 18px;
  border-radius: 8px;
  cursor: pointer;
  transition: all 0.3s ease;
  /* animation: fadeIn 3s ease-in-out 0.5s forwards; */
  opacity: 0;
  position: relative;
  left: 100px; /* move button to the right */
    }

    .general-explore-btn:hover {
      background: #C4AE45;
      color: black;
    }

    /* Illustration */
    .general-illustration img {
      max-width: 600px;
      height: auto;
      display: block;
      position: relative;
      z-index: 2;
      margin-bottom: 50px; /* space between text and illustration */
      
    }
  </style>
</head>
<body>
  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg navbar-dark fixed-top custom-navbar">
  <a class="navbar-brand" href="#page-home" height="50" width="60"><img src="font-01.svg" class="font-size"/></a>
  <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarNav" 
          aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
    <span class="navbar-toggler-icon"></span>
  </button>

  <div class="collapse navbar-collapse" id="navbarNav">
    <ul class="navbar-nav ml-auto">
      <li class="nav-item"><a class="nav-link" href="#page-general">General</a></li>
      <li class="nav-item"><a class="nav-link" href="experiments.html">Team</a></li>
      <li class="nav-item"><a class="nav-link" href="overview.html">Overview</a></li>
      <li class="nav-item"><a class="nav-link" href="menu.html">Menu</a></li>
      <li class="nav-item"><a class="nav-link" href="menu.html" onclick="checkOutNotFound()">Checkout</a></li>
      <li class="nav-item"><a class="nav-link" href="payment.html#events">Event</a></li>
      <li class="nav-item"><a class="nav-link" href="review.html">Review</a></li>
      <li class="nav-item"><a class="nav-link" href="review.html#questionaire">Contact</a></li>
        </ul>
  </div>
</nav>

  <!-- Home Section -->
  <div class="body-home" id="page-home">
    <div class="home">
      <div class="logo-container">
        <img src="LOGO2.svg" alt="AUDIOBITES Logo">
        <svg class="pulse-svg" viewBox="0 0 200 200">
          <circle class="pulse" cx="100" cy="100" r="40"/>
        </svg>
      </div>

      <div class="text-container">
        <h1 class="home-heading">AUDIOBITES</h1>
        <p class="home-tagline">Where Food Meets Music</p>
      </div>

      <div class="ellipse"></div>
    </div>
  </div>
  <!-- general Section -->
   <div class="general-body" id="page-general">
    <div class="general">
    <div class="general-text">
      <h1>Craving flavors<br>That SING?</h1>
      <p>Let your taste buds and soul harmonize here</p>
  <button class="general-explore-btn" id="explore-btn" onclick="location.href='experiments.html'">Explore</button>
    </div>
    <div class="general-illustration">
      <img src="gen-01.svg" alt="Illustration">
    </div>
  </div>
  </div>

  <script>
  // When page-general comes into view → animate
const generalSection = document.getElementById("page-general");
const h1 = document.querySelector(".general-text h1");
const btn = document.querySelector(".general-explore-btn");

const observer = new IntersectionObserver((entries) => {
  entries.forEach(entry => {
    if (entry.isIntersecting) {
      // Animate heading
      h1.style.transition = "all 3s ease";
      h1.style.opacity = 1;
      h1.style.transform = "translateX(0)";
      
      // Animate button
      btn.style.transition = "opacity 3s ease-in-out 0.5s";
      btn.style.opacity = 1;

      observer.unobserve(generalSection); // trigger only once
    }
  });
}, { threshold: 0.5 }); // fire when 50% of section is visible

observer.observe(generalSection);

// check out not found
function checkOutNotFound(){
  alert("Please place an order first");
}

    //refresh to top
window.onbeforeunload = () => {
  window.scrollTo(0, 0);
};
</script>
</body>
</html>
